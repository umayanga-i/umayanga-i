name: metrics

on:
  # Runs automatically every day at 00:00 UTC — tweak as you like
  schedule:
    - cron: "0 0 * * *"
  # Lets you trigger it manually from the Actions tab
  workflow_dispatch:
  # Also runs once whenever you push to main, so you see it working immediately
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Required: a token with repo + read:user scopes.
          # Create one in GitHub Settings > Developer settings > Personal access tokens,
          # then save it as a repo secret named METRICS_TOKEN.
          token: ${{ secrets.METRICS_TOKEN }}

          # Where the generated image is committed in this repo
          filename: github-metrics.svg

          # ---- Look & feel ----
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Colombo

          # ---- Plugins (this is where the "unique" stuff comes from) ----
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_load: 300
          plugin_languages_recent_days: 14
          plugin_languages_threshold: 0%
          plugin_languages_limit: 8

          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes

          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C

          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all

          plugin_calendar: yes

          plugin_music: no
          plugin_notable: yes
          plugin_notable_from: all
          plugin_notable_types: star, fork

          plugin_stars: yes
          plugin_stars_limit: 4

          plugin_topics: yes
          plugin_topics_limit: 10
          plugin_topics_mode: icons

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
